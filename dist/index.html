<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gameboy Emulator</title>
  <link rel="icon" href="data:,">
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #ccc; margin: 40px; }
    h1 { color: #fff; margin-bottom: 4px; }
    #controls { margin: 16px 0; display: flex; align-items: center; gap: 12px; }
    #rom-label {
      display: inline-block;
      padding: 8px 16px;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      transition: background 0.15s;
    }
    #rom-label:hover { background: #444; }
    #rom-name { color: #888; font-size: 13px; }
    #screen { display: block; border: 2px solid #444; image-rendering: pixelated; width: 320px; height: 288px; }
    #rom-input { display: none; }
  </style>
</head>
<body>
  <h1>Game Boy Emulator</h1>
  <div id="controls">
    <label id="rom-label" for="rom-input">📂 Load ROM</label>
    <span id="rom-name">No ROM loaded</span>
    <input type="file" id="rom-input" accept=".gb,.gbc">
  </div>
  <canvas id="screen" width="160" height="144"></canvas>
  <script type="module" src="/bundle.js"></script>
  <script>
    document.getElementById('rom-input').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      document.getElementById('rom-name').textContent = file.name;
      if (typeof window.loadRomFile === 'function') {
        window.loadRomFile(file);
      }
    });
  </script>
</body>
</html>
