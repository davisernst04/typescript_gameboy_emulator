<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Boy Emulator</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --accent-color: #00ff41;
      --text-main: #e0e0e0;
      --text-muted: #888;
      --border-color: #333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      color: #fff;
      margin: 0;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 1.8rem;
    }

    .emulator-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      width: 100%;
    }

    .btn {
      background: #333;
      color: #fff;
      border: 1px solid #444;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background: #444;
      border-color: #666;
    }

    .btn-primary {
      background: var(--accent-color);
      color: #000;
      border: none;
      font-weight: bold;
    }

    .btn-primary:hover {
      background: #00dd3a;
    }

    #rom-name {
      color: var(--text-muted);
      font-size: 13px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .scale-toggle {
      display: flex;
      background: #2a2a2a;
      border-radius: 6px;
      padding: 2px;
    }

    .scale-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .scale-btn.active {
      background: #444;
      color: #fff;
    }

    #screen-container {
      background: #000;
      padding: 4px;
      border-radius: 4px;
      border: 1px solid #333;
      line-height: 0;
    }

    #screen {
      display: block;
      image-rendering: pixelated;
      width: 320px; /* Default 2x */
      height: 288px;
    }

    .info-panel {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }

    .mapping-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mapping-title {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .mapping-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .key {
      background: #333;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: var(--accent-color);
      border-bottom: 2px solid #1a1a1a;
    }

    #rom-input { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Game Boy</h1>

    <div class="emulator-card">
      <div id="controls">
        <label class="btn btn-primary" for="rom-input">
          <span>📂</span> Load ROM
        </label>
        <span id="rom-name">No ROM loaded</span>
        <input type="file" id="rom-input" accept=".gb,.gbc">

        <div class="scale-toggle" id="scale-controls">
          <button class="scale-btn" data-scale="1">1x</button>
          <button class="scale-btn active" data-scale="2">2x</button>
          <button class="scale-btn" data-scale="3">3x</button>
        </div>
      </div>

      <div id="screen-container">
        <canvas id="screen" width="160" height="144"></canvas>
      </div>
    </div>

    <div class="info-panel">
      <div class="mapping-group">
        <div class="mapping-title">D-Pad</div>
        <div class="mapping-item"><span>Up / Down</span> <span class="key">Arrows</span></div>
        <div class="mapping-item"><span>Left / Right</span> <span class="key">Arrows</span></div>
      </div>
      <div class="mapping-group">
        <div class="mapping-title">Buttons</div>
        <div class="mapping-item"><span>Button A</span> <span class="key">Z</span></div>
        <div class="mapping-item"><span>Button B</span> <span class="key">X</span></div>
      </div>
      <div class="mapping-group">
        <div class="mapping-title">System</div>
        <div class="mapping-item"><span>Start</span> <span class="key">Enter</span></div>
        <div class="mapping-item"><span>Select</span> <span class="key">Shift</span></div>
      </div>
    </div>
  </div>

  <script type="module" src="/bundle.js"></script>
  <script>
    const romInput = document.getElementById('rom-input');
    const romName = document.getElementById('rom-name');
    const screen = document.getElementById('screen');
    const scaleBtns = document.querySelectorAll('.scale-btn');

    romInput.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      romName.textContent = file.name;
      if (typeof window.loadRomFile === 'function') {
        window.loadRomFile(file);
      }
    });

    scaleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const scale = parseInt(btn.getAttribute('data-scale'));
        
        // Update UI
        scaleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update Canvas size
        screen.style.width = (160 * scale) + 'px';
        screen.style.height = (144 * scale) + 'px';
      });
    });
  </script>
</body>
</html>
